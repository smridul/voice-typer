name: VoiceTyper

options:
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: 5.0
    DEVELOPMENT_TEAM: "SPB6M3V9N2"

targets:
  VoiceTyperCore:
    type: framework
    platform: iOS
    sources:
      - path: VoiceTyperCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mridul.voice-typer.core
        PRODUCT_NAME: VoiceTyperCore
        GENERATE_INFOPLIST_FILE: YES
    scheme:
      testTargets:
        - VoiceTyperCoreTests

  VoiceTyper:
    type: application
    platform: iOS
    configFiles:
      Debug: Config/LocalSecrets.xcconfig
      Release: Config/LocalSecrets.xcconfig
    sources:
      - path: VoiceTyper
      - path: Shared
    info:
      path: VoiceTyper/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        GROQ_API_KEY: $(GROQ_API_KEY)
        NSMicrophoneUsageDescription: VoiceTyper needs microphone access so you can dictate text.
        UIApplicationSceneManifest: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mridul.voice-typer
        PRODUCT_NAME: VoiceTyper
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: VoiceTyper/VoiceTyper.entitlements
    dependencies:
      - target: VoiceTyperKeyboard
        embed: true
        sign: false
      - target: VoiceTyperCore
        embed: true

  VoiceTyperKeyboard:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Config/LocalSecrets.xcconfig
      Release: Config/LocalSecrets.xcconfig
    sources:
      - path: VoiceTyperKeyboard
      - path: Shared
    info:
      path: VoiceTyperKeyboard/Info.plist
      properties:
        CFBundleDisplayName: VoiceTyper
        GROQ_API_KEY: $(GROQ_API_KEY)
        NSExtension:
          NSExtensionAttributes:
            PrimaryLanguage: en
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mridul.voice-typer.keyboard
        PRODUCT_NAME: VoiceTyperKeyboard
        CODE_SIGN_ENTITLEMENTS: VoiceTyperKeyboard/VoiceTyperKeyboard.entitlements
    dependencies:
      - target: VoiceTyperCore
        embed: false
    scheme:
      testTargets:
        - VoiceTyperKeyboardTests

  VoiceTyperTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VoiceTyperTests
    dependencies:
      - target: VoiceTyper
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

  VoiceTyperKeyboardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VoiceTyperKeyboardTests
    dependencies:
      - target: VoiceTyperKeyboard
      - target: VoiceTyper
    settings:
      base:
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/VoiceTyper.app/VoiceTyper
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: YES

  VoiceTyperCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VoiceTyperCoreTests
    dependencies:
      - target: VoiceTyperCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
